# nginx.conf para servir o build estático do todo-list-testing
#
# Uso num container nginx (ex: nginx:latest ou nginx:1.27-alpine):
#
#   COPY dist/ /usr/share/nginx/html/
#   COPY nginx.conf /etc/nginx/nginx.conf
#
# O conteúdo de dist/ vai direto para o document root do nginx.
# Nenhuma configuração de TLS — terminação SSL deve ser feita no load balancer / proxy externo.

worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile   on;
    tcp_nopush on;

    keepalive_timeout 65;

    # Compressão gzip para assets de texto
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    server {
        listen      80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Assets com hash no nome (ex: assets/index-CA1gqXvj.js)
        # podem ser cacheados por 1 ano — o hash muda a cada build
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html nunca deve ser cacheado — é o ponto de entrada
        # e seu conteúdo muda a cada deploy
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Fallback para qualquer outra rota estática
        location / {
            try_files $uri $uri/ =404;
        }

        # Cabeçalhos de segurança básicos
        add_header X-Content-Type-Options "nosniff"    always;
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
